<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기자간담회 제작 도구 · Press Day Toolkit</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --navy:#0b1f3a;
  --navy-2:#132c52;
  --mint:#00c9b3;
  --mint-dark:#00a897;
  --paper:#fffdf9;
  --bg:#eef1f5;
  --card:#ffffff;
  --ink:#161b22;
  --muted:#69707c;
  --line:#dfe4ea;
  --line-2:#eceff3;
  --warn:#e04b3f;
  --warn-bg:#fdeceb;
  --radius:10px;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  font-family:'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
.app{display:flex; min-height:100vh;}

/* ---------- SIDEBAR ---------- */
.sidebar{
  width:236px; flex:0 0 236px;
  background:linear-gradient(180deg,var(--navy) 0%, var(--navy-2) 100%);
  color:#fff; position:sticky; top:0; height:100vh; overflow-y:auto;
  padding:22px 0 20px;
}
.brand{padding:0 20px 18px; border-bottom:1px solid rgba(255,255,255,.12); margin-bottom:10px;}
.brand .mark{display:inline-flex; align-items:center; gap:8px; font-weight:700; font-size:15px; letter-spacing:.2px;}
.brand .mark .dot{width:9px;height:9px;border-radius:50%;background:var(--mint);display:inline-block;}
.brand .sub{margin-top:6px; font-size:11.5px; color:rgba(255,255,255,.55); line-height:1.5;}
nav.steps{padding:6px 10px;}
.step-btn{
  width:100%; display:flex; align-items:center; gap:11px; text-align:left;
  background:transparent; border:none; color:rgba(255,255,255,.72);
  padding:10px 10px; border-radius:8px; cursor:pointer; font-size:13.3px;
  font-family:inherit; margin-bottom:2px; transition:background .15s, color .15s;
}
.step-btn:hover{background:rgba(255,255,255,.07); color:#fff;}
.step-btn.active{background:rgba(0,201,179,.16); color:#fff;}
.step-btn.active .num{background:var(--mint); color:var(--navy);}
.step-btn .num{
  flex:0 0 22px; height:22px; border-radius:6px; background:rgba(255,255,255,.12);
  display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700;
  font-variant-numeric:tabular-nums;
}
.step-btn .label{display:flex; flex-direction:column;}
.step-btn .label b{font-weight:600; font-size:13.2px;}
.step-btn .label small{font-size:10.6px; color:rgba(255,255,255,.45); font-weight:400;}
.step-btn.active .label small{color:rgba(255,255,255,.65);}

/* ---------- MAIN ---------- */
.main{flex:1; min-width:0; padding:34px 40px 80px;}
.panel{display:none;}
.panel.active{display:block; animation:fade .25s ease;}
@keyframes fade{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}

.panel-head{display:flex; justify-content:space-between; align-items:flex-end; gap:20px; margin-bottom:22px; flex-wrap:wrap;}
.panel-head h1{font-size:22px; margin:0 0 6px; letter-spacing:-.2px;}
.panel-head p{margin:0; color:var(--muted); font-size:13.5px; max-width:640px; line-height:1.6;}
.eyebrow{display:inline-block; font-size:11px; font-weight:700; color:var(--mint-dark); letter-spacing:.06em; text-transform:uppercase; margin-bottom:6px;}
.toolbar{display:flex; gap:8px; flex-shrink:0;}
.btn{
  border:1px solid var(--line); background:#fff; color:var(--ink); font-family:inherit;
  padding:9px 14px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer;
  display:inline-flex; align-items:center; gap:6px; transition:all .15s;
}
.btn:hover{border-color:var(--mint); color:var(--mint-dark);}
.btn.primary{background:var(--navy); border-color:var(--navy); color:#fff;}
.btn.primary:hover{background:var(--navy-2); color:#fff;}
.btn.ghost{background:transparent; border-color:transparent; color:var(--muted); padding:9px 10px;}
.btn.small{padding:6px 10px; font-size:12px; border-radius:6px;}
.btn.danger{color:var(--warn);}

.workspace{display:grid; grid-template-columns:minmax(320px,1fr) minmax(360px,1.15fr); gap:22px; align-items:start;}
@media(max-width:1080px){.workspace{grid-template-columns:1fr;}}

.card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:20px 22px; margin-bottom:18px;}
.card h3{font-size:13.5px; margin:0 0 3px; font-weight:700;}
.card .hint{font-size:11.8px; color:var(--muted); margin:0 0 14px; line-height:1.5;}
.field{margin-bottom:13px;}
.field label{display:block; font-size:12px; font-weight:600; color:#3a4150; margin-bottom:5px;}
.field .fhint{font-size:11px; color:var(--muted); margin-top:4px;}
input[type=text], input[type=number], input[type=url], input[type=email], textarea, select{
  width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:7px;
  font-family:inherit; font-size:13px; color:var(--ink); background:#fbfcfd;
}
input:focus, textarea:focus, select:focus{outline:none; border-color:var(--mint); background:#fff;}
textarea{resize:vertical; line-height:1.55;}
.row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.row3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;}

.dyn-item{border:1px solid var(--line-2); border-radius:8px; padding:12px 12px 8px; margin-bottom:10px; background:#fafbfc; position:relative;}
.dyn-item .rm{position:absolute; top:8px; right:8px;}
.add-row{width:100%; border:1.5px dashed var(--line); background:transparent; color:var(--muted); padding:10px; border-radius:8px; cursor:pointer; font-family:inherit; font-size:12.5px; font-weight:600;}
.add-row:hover{border-color:var(--mint); color:var(--mint-dark);}

/* ---------- PREVIEW / PAPER ---------- */
.preview-wrap{position:sticky; top:20px;}
.preview-label{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
.preview-label span{font-size:11.5px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.06em;}
.paper{
  background:var(--paper); border:1px solid var(--line); border-radius:6px;
  box-shadow:0 10px 30px rgba(20,30,50,.08);
  padding:38px 40px; font-family:'Noto Serif KR', serif; color:#20242c;
  max-height:78vh; overflow-y:auto;
}
.paper h2.doc-title{font-size:19px; margin:0 0 2px; font-weight:700;}
.paper .doc-sub{font-size:12.5px; color:#6a5a4a; margin:0 0 18px;}
.paper hr{border:none; border-top:1px solid #e6ded0; margin:16px 0;}
.paper table{width:100%; border-collapse:collapse; font-size:12px; margin:10px 0;}
.paper table th, .paper table td{border:1px solid #ddd4c2; padding:7px 8px; text-align:left; vertical-align:top;}
.paper table th{background:#f4efe4; font-weight:700;}
.embargo-badge{
  display:inline-flex; align-items:center; gap:6px; background:var(--warn-bg); color:var(--warn);
  border:1px solid #f3c9c3; font-family:'Pretendard',sans-serif; font-weight:700; font-size:11.5px;
  padding:5px 10px; border-radius:20px; margin:4px 0 14px;
}
.mint-tag{display:inline-block; background:#e6faf6; color:var(--mint-dark); font-family:'Pretendard',sans-serif; font-weight:700; font-size:11px; padding:3px 9px; border-radius:20px; margin-right:6px;}
.qsec{margin:14px 0 6px; font-family:'Pretendard',sans-serif; font-weight:700; font-size:12.5px; color:var(--navy);}
.script-line{margin:0 0 10px; line-height:1.75; font-size:13.2px;}
.script-line .dir{font-family:'Pretendard',sans-serif; color:#8a8578; font-size:11.5px; display:block; margin-bottom:2px;}
.qitem{margin:0 0 10px; padding-left:14px; border-left:2px solid #e6ded0; line-height:1.6; font-size:12.8px;}
.qitem b{color:var(--navy);}

/* Media welcome screen */
.screen-mock{
  width:100%; aspect-ratio:16/9; border-radius:14px; position:relative; overflow:hidden;
  display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
  padding:6%; box-shadow:0 20px 50px rgba(0,0,0,.35);
}
.screen-mock .ey{font-family:'Pretendard',sans-serif; letter-spacing:.35em; font-size:1.1vw; font-weight:700; opacity:.75; margin-bottom:1.2vw;}
.screen-mock h1{font-family:'Pretendard',sans-serif; font-weight:800; font-size:3.1vw; line-height:1.25; margin:0 0 1vw; letter-spacing:-.01em;}
.screen-mock .sub{font-family:'Pretendard',sans-serif; font-size:1.25vw; opacity:.85; margin:0;}
.screen-mock .foot{position:absolute; bottom:5%; left:0; right:0; display:flex; justify-content:center; gap:.8vw; align-items:center; font-family:'Pretendard',sans-serif; font-size:1vw; opacity:.8;}
.screen-mock .foot .bar{width:1px; height:1vw; background:currentColor; opacity:.4;}

.status-pill{display:inline-block; font-size:11px; font-weight:700; padding:2px 9px; border-radius:20px; font-family:'Pretendard',sans-serif;}
.pill-done{background:#e5f7ee; color:#1c9a5b;}
.pill-progress{background:#fff4e0; color:#c98014;}
.pill-todo{background:#eef0f3; color:#6b7684;}

.empty-note{color:var(--muted); font-size:12.5px; font-style:italic;}

/* print */
#printRoot{display:none;}
@media print{
  body *{visibility:hidden;}
  #printRoot, #printRoot *{visibility:visible;}
  #printRoot{display:block; position:absolute; top:0; left:0; width:100%; padding:20px 30px;}
  .paper{box-shadow:none; border:none; max-height:none; overflow:visible;}
}
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-thumb{background:#c9d0d8; border-radius:8px;}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="mark"><span class="dot"></span> PRESS DAY TOOLKIT</div>
      <div class="sub">기자간담회 · 시연회 준비 자료<br>한 번의 정보 입력으로 7종 자료 완성</div>
    </div>
    <nav class="steps" id="stepNav"></nav>
  </aside>

  <main class="main">
    <div id="panels"></div>
  </main>
</div>

<div id="printRoot"></div>

<script>
/* ============ STEP DEFINITIONS ============ */
const STEPS = [
  {id:'base',   num:'00', label:'기본 정보',        sub:'공통 입력'},
  {id:'invite', num:'01', label:'기자 초청장',        sub:'Invitation'},
  {id:'guide',  num:'02', label:'기자 안내문',        sub:'On-site Guide'},
  {id:'mc',     num:'03', label:'사회자 스크립트',    sub:'MC Script'},
  {id:'cue',    num:'04', label:'큐시트',            sub:'Cue Sheet'},
  {id:'todo',   num:'05', label:'To-Do 리스트',      sub:'Checklist'},
  {id:'wrap',   num:'06', label:'랩업 자료',          sub:'Wrap-up'},
  {id:'screen', num:'07', label:'미디어 환영 스크린', sub:'Welcome Screen'},
];

const stepNav = document.getElementById('stepNav');
stepNav.innerHTML = STEPS.map(s=>`
  <button class="step-btn" id="nav-${s.id}" onclick="showPanel('${s.id}')">
    <span class="num">${s.num}</span>
    <span class="label"><b>${s.label}</b><small>${s.sub}</small></span>
  </button>
`).join('');

function showPanel(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active', p.id==='panel-'+id));
  document.querySelectorAll('.step-btn').forEach(b=>b.classList.toggle('active', b.id==='nav-'+id));
  window.scrollTo(0,0);
  renderAll();
}

/* ============ HELPERS ============ */
function setField(path, value){
  const keys = path.split('.');
  let obj = state;
  for(let i=0;i<keys.length-1;i++){
    let k = keys[i];
    if(/^\d+$/.test(k)) k = parseInt(k);
    obj = obj[k];
  }
  let lastKey = keys[keys.length-1];
  if(/^\d+$/.test(lastKey)) lastKey = parseInt(lastKey);
  obj[lastKey] = value;
}
function getField(path){
  const keys = path.split('.');
  let obj = state;
  for(const k of keys){ if(obj==null) return ''; obj = obj[/^\d+$/.test(k)?parseInt(k):k]; }
  return obj==null? '' : obj;
}
function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function nl2br(s){ return esc(s).replace(/\n/g,'<br>'); }
function fill(tpl){
  return tpl.replace('{event}', state.event.name)
            .replace('{ceo}', state.org.ceoName)
            .replace('{speaker2}', state.org.speaker2)
            .replace('{venue}', state.event.venueName)
            .replace('{date}', state.event.dateDisplay)
            .replace('{time}', state.event.timeDisplay)
            .replace('{embargoDate}', state.event.embargoDate)
            .replace('{embargoNote}', state.event.embargoNote)
            .replace('{wifiName}', state.event.wifiName);
}

function fieldInput(label, path, opts={}){
  const val = getField(path);
  const type = opts.type||'text';
  if(type==='textarea'){
    return `<div class="field"><label>${label}</label>
      <textarea rows="${opts.rows||3}" oninput="setField('${path}', this.value); renderAll();">${esc(val)}</textarea>
      ${opts.hint?`<div class="fhint">${opts.hint}</div>`:''}</div>`;
  }
  return `<div class="field"><label>${label}</label>
    <input type="${type}" value="${esc(val)}" oninput="setField('${path}', this.value); renderAll();">
    ${opts.hint?`<div class="fhint">${opts.hint}</div>`:''}</div>`;
}

function downloadFile(filename, content, mime){
  const blob = new Blob([content], {type:mime||'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}
function toCSV(rows){
  return rows.map(r=>r.map(c=>{
    const s = (c==null?'':String(c)).replace(/"/g,'""');
    return /[",\n]/.test(s) ? `"${s}"` : s;
  }).join(',')).join('\n');
}
function printPaper(paperId, title){
  const root = document.getElementById('printRoot');
  const src = document.getElementById(paperId);
  root.innerHTML = `<div class="paper" style="max-height:none;box-shadow:none;">${src.innerHTML}</div>`;
  document.title = title;
  window.print();
}

}

const SCREEN_BGS = {
  g1: 'linear-gradient(135deg,#0b1f3a 0%, #12406b 55%, #00c9b3 130%)',
  g2: 'linear-gradient(135deg,#101418 0%, #1c2530 100%)',

              <option value="g2" ${s.bg==='g2'?'selected':''}>딥 다크</option>
              <option value="g3" ${s.bg==='g3'?'selected':''}>민트 × 네이비</option>
              <option value="g4" ${s.bg==='g4'?'selected':''}>라이트 크림 (밝은 배경)</option>
            </select>
          </div>
          <div class="field"><label>텍스트 색상</label>
            <input type="text" value="${esc(s.color)}" oninput="setField('screen.color', this.value); renderAll();" placeholder="#ffffff">

          </div>
        </div>
      </div>

      </div>

function renderScreen(){
  const el = document.getElementById('screenCanvas'); if(!el) return;
  const s = state.screen;
  el.style.background = SCREEN_BGS[s.bg] || SCREEN_BGS.g1;
  el.style.color = s.color || '#ffffff';
  el.innerHTML = `
    <div class="ey">${esc(s.eyebrow)}</div>
    <h1>${nl2br(s.title)}</h1>
    <p class="sub">${esc(s.subtitle)}</p>

    </div>
  `;
}
function downloadScreenPNG(){
  const node = document.getElementById('screenCanvas');
  if(!window.html2canvas){ toast('이미지 라이브러리를 불러오는 중입니다. 잠시 후 다시 시도해주세요.'); return; }
  html2canvas(node, {scale:2, backgroundColor:null}).then(canvas=>{
    canvas.toBlob(blob=>{
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = '기자환영스크린.png'; a.click();
      URL.revokeObjectURL(url);
    });
  });
}

/* ============ REGISTRY / INIT ============ */
const PANEL_BUILDERS = {
  base: buildBasePanel, invite: buildInvitePanel, guide: buildGuidePanel,
  mc: buildMcPanel, cue: buildCuePanel, todo: buildTodoPanel,
  wrap: buildWrapPanel, screen: buildScreenPanel,
};
const RENDERERS = {
  base: renderBase, invite: renderInvite, guide: renderGuide,
  mc: renderMc, cue: renderCue, todo: renderTodo,
  wrap: renderWrap, screen: renderScreen,
};
function refreshPanel(id){
  const old = document.getElementById('panel-'+id);
  const wasActive = old.classList.contains('active');
  const tmp = document.createElement('div');
  tmp.innerHTML = PANEL_BUILDERS[id]();
  const fresh = tmp.firstElementChild;
  if(wasActive) fresh.classList.add('active');
  old.replaceWith(fresh);
  RENDERERS[id]();
}
function renderAll(){ Object.values(RENDERERS).forEach(fn=>fn()); }

document.getElementById('panels').innerHTML = STEPS.map(s=>PANEL_BUILDERS[s.id]()).join('');
showPanel('base');
